<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Editor - Precision Debug</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1a1a1a; color: white; overflow: hidden; }
  
  /* THANH CÔNG CỤ */
  .topbar { display: flex; gap: 6px; padding: 10px; background: #111; border-bottom: 1px solid #333; overflow-x: auto; }
  .topbar button { padding: 8px 12px; border: none; border-radius: 6px; background: #333; color: white; cursor: pointer; font-size: 11px; white-space: nowrap; }
  .btn-run { background: #28a745 !important; margin-left: auto; font-weight: bold; padding: 8px 20px !important; }

  /* KHU VỰC EDITOR */
  .main { display: flex; flex-direction: column; flex: 1; }
  .editor-container { display: flex; height: 45%; background: #1e1e1e; border-bottom: 2px solid #333; }
  .line-numbers { width: 35px; padding: 15px 0; text-align: center; background: #252526; color: #858585; font-family: monospace; font-size: 13px; line-height: 20px; user-select: none; }
  .line-error { color: #ff4d4d !important; font-weight: bold; background: rgba(255, 77, 77, 0.3); }
  textarea { flex: 1; background: transparent; color: #9cdcfe; padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 20px; border: none; outline: none; resize: none; white-space: pre; overflow: auto; }

  /* BÁO LỖI & PREVIEW */
  #error-log { display: none; background: #4a1515; color: #ff9999; padding: 10px; font-family: monospace; font-size: 12px; border-bottom: 1px solid #ff4d4d; line-height: 1.5; }
  iframe { height: 55%; width: 100%; background: white; border: none; }

  /* POPUP */
  .popup { position: fixed; bottom: 0; left: 0; right: 0; background: #252526; border-top: 2px solid #0078d4; padding: 15px; display: none; flex-direction: column; max-height: 60%; z-index: 1000; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; overflow-y: auto; padding-bottom: 20px; }
  .grid button { padding: 10px; border: 1px solid #444; border-radius: 4px; background: #333; color: #ddd; cursor: pointer; font-size: 11px; text-align: left; }
</style>
</head>
<body>

<div class="topbar">
  <button onclick="openPopup('html')">HTML</button>
  <button onclick="openPopup('css')">CSS</button>
  <button onclick="openPopup('js')">JS</button>
  <button class="btn-run" onclick="runCode()">CHẠY (RUN) ▶</button>
</div>

<div class="main">
  <div class="editor-container">
    <div id="line-numbers" class="line-numbers"></div>
    <textarea id="code" spellcheck="false" oninput="updateLineNumbers()" onscroll="syncScroll()"><h1>Test Lỗi</h1>
<script>
  console.log("Thiếu ngoặc"
</script></textarea>
  </div>
  <div id="error-log"></div>
  <iframe id="preview"></iframe>
</div>

<div class="popup" id="popup">
  <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
     <b id="pop-title">MENU</b>
     <span onclick="closePopup()" style="color:red; cursor:pointer; font-weight:bold;">ĐÓNG [X]</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const textarea = document.getElementById("code");
const lineNumbers = document.getElementById("line-numbers");
const errorLog = document.getElementById("error-log");
const preview = document.getElementById("preview");
const grid = document.getElementById("grid");
const popup = document.getElementById("popup");

/* HÀM CÔNG CỤ */
const data = {
  html: [{n:"<style>", a:()=>wrap("<style>\n","\n</style>")}, {n:"<script>", a:()=>wrap("<script>\n","\n<\/script>")}, {n:"<div>", a:()=>wrap("<div>","</div>")}],
  css: [{n:"display: flex", a:()=>ins("display: flex;")}, {n:"gap", a:()=>ins("gap: 10px;")}, {n:"border-radius", a:()=>ins("border-radius: 8px;")}],
  js: [{n:"console.log", a:()=>ins('console.log("");')}, {n:"alert", a:()=>ins('alert("");')}]
};

function openPopup(type) {
  grid.innerHTML = "";
  data[type].forEach(item => {
    const btn = document.createElement("button");
    btn.textContent = item.n;
    btn.onclick = () => { item.a(); closePopup(); runCode(); };
    grid.appendChild(btn);
  });
  popup.style.display = "flex";
}
function closePopup() { popup.style.display = "none"; }

function ins(val) {
  const s = textarea.selectionStart;
  textarea.value = textarea.value.slice(0, s) + val + textarea.value.slice(textarea.selectionEnd);
  textarea.focus();
  updateLineNumbers();
}

function wrap(open, close) {
  const s = textarea.selectionStart;
  const e = textarea.selectionEnd;
  const sel = textarea.value.substring(s, e);
  textarea.value = textarea.value.slice(0, s) + open + sel + close + textarea.value.slice(e);
  textarea.focus();
  updateLineNumbers();
}

/* LOGIC SỐ DÒNG & SCROLL */
function updateLineNumbers(errorLine = null) {
  const lines = textarea.value.split('\n').length;
  let lineStr = '';
  for (let i = 1; i <= lines; i++) {
    lineStr += `<div class="${i === errorLine ? 'line-error' : ''}">${i}</div>`;
  }
  lineNumbers.innerHTML = lineStr;
}
function syncScroll() { lineNumbers.scrollTop = textarea.scrollTop; }

/* CHẠY VÀ DEBUG CHÍNH XÁC */
function runCode() {
  const userCode = textarea.value;
  errorLog.style.display = "none";
  updateLineNumbers();

  // Tạo nội dung chạy với hệ thống bắt lỗi Column
  const blobContent = `
    <!DOCTYPE html>
    <html>
    <head>
      <style>body{margin:10px; font-family:sans-serif;}</style>
      <script>
        window.onerror = function(msg, url, line, col) {
          // Gửi đầy đủ msg, line, col về trang cha
          window.parent.postMessage({
            type: 'error',
            msg: msg,
            line: line - 19, // Trừ 11 dòng hệ thống phía trên
            col: col
          }, '*');
          return true;
        };
      <\/script>
    </head>
    <body>
      ${userCode}
    </body>
    </html>
  `;
  
  const blob = new Blob([blobContent], { type: 'text/html' });
  preview.src = URL.createObjectURL(blob);
}

// Lắng nghe tin nhắn lỗi
window.addEventListener('message', (e) => {
  if (e.data.type === 'error') {
    const { msg, line, col } = e.data;
    errorLog.style.display = "block";
    
    // SỬA DÒNG NÀY: Dùng dấu backtick ` và xóa dấu \ trước dấu $
    errorLog.innerHTML = `⚠️ <b>LỖI:</b> ${msg} <br> [Dòng: ${line}, Ký tự thứ: ${col}]`;
    
    updateLineNumbers(line);
  }
});


updateLineNumbers();
runCode();
</script>
</body>
</html>
