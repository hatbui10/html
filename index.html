<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Editor Ultra Pro - Full Fixed</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1a1a1a; color: white; overflow: hidden; }
  
  /* THANH CÔNG CỤ */
  .topbar { display: flex; gap: 6px; padding: 10px; background: #111; border-bottom: 1px solid #333; overflow-x: auto; align-items: center; height: 50px;flex-shrink: 0; }
  .topbar button { padding: 8px 12px; border: none; border-radius: 6px; background: #333; color: white; cursor: pointer; font-size: 11px; white-space: nowrap; }
  .btn-reload { background: #ce9178 !important; color: #000 !important; font-weight: bold; }
  .btn-history { background: #444 !important; color: #fff !important; } /* Màu nút Undo/Redo */
  .btn-run { background: #28a745 !important; margin-left: auto; font-weight: bold; padding: 8px 20px !important; }

  /* HỆ THỐNG TAB */
  .tab-bar { display: flex; background: #252526; padding-left: 10px; gap: 2px; border-bottom: 1px solid #333; user-select: none; height: 40px;flex-shrink: 0; }
  .tab-item { padding: 8px 20px; cursor: pointer; background: #2d2d2d; color: #969696; font-size: 12px; font-weight: 500; border-radius: 5px 5px 0 0; margin-top: 5px; display: flex; align-items: center; gap: 8px; }
  .tab-item.active { background: #1e1e1e; color: #ffffff; border-bottom: 2px solid #007acc; }

  /* NỘI DUNG CHÍNH */
  .main-content { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
  .window-pane { display: none; height: 100%; width: 100%; flex-direction: column; }
  .window-pane.active { display: flex; }

  /* EDITOR */
  .editor-container { display: flex; flex: 1; background: #1e1e1e; overflow: hidden; position: relative; }
  .line-numbers { width: 40px; padding: 15px 0; text-align: center; background: #252526; color: #858585; font-family: monospace; font-size: 14px; line-height: 20px; user-select: none; overflow: hidden; }
  .line-error { color: #ff4d4d !important; font-weight: bold; background: rgba(255, 77, 77, 0.2); }
  
  textarea { 
    flex: 1; background: transparent; color: #9cdcfe; padding: 15px; 
    font-family: 'Consolas', monospace; font-size: 14px; line-height: 20px; 
    border: none; outline: none; resize: none; white-space: pre; 
    overflow: auto; overscroll-behavior: contain; 
  }

  /* PREVIEW */
  #pane-preview { align-items: center; background: #1a1a1a; }
  iframe { 
    width: 95%; height: 95%; border: none; background: white; 
    margin: auto; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); 
  }

  #error-log { display: none; background: #4a1515; color: #ff9999; padding: 10px; font-family: monospace; font-size: 12px; }

  /* POPUP */
  .popup {
    display: none; position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); 
    width: 95%; background: #252526; border: 2px solid #0078d4; padding: 2px 3px; 
    z-index: 9999; border-radius: 8px; box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
  }
  .grid { display: flex; flex-flow: column wrap; height: 50px; gap: 6px; margin-top: 5px; overflow-x: auto; overflow-y: hidden; padding-bottom: 3px; }
  .grid button { flex: 0 0 auto; padding: 1px 3px; height: calc(50% - 3px); white-space: nowrap; border: 1px solid #444; border-radius: 4px; background: #333; color: #ddd; font-size: 12px; font-weight: bold; }
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-reload" onclick="resetEditor()">🔄 Reset</button>
  <button class="btn-history" onclick="undo()">↩ Undo</button>
  <button class="btn-history" onclick="redo()">↪ Redo</button>
  <button onclick="openPopup('quick')">⌨️ Phím nhanh</button>
  <button onclick="openPopup('html')">HTML</button>
  <button onclick="openPopup('css')">CSS</button>
  <button onclick="openPopup('js')">JS</button>
  <button class="btn-run" onclick="runCode()">CHẠY & XEM ▶</button>
</div>

<div class="tab-bar">
  <div class="tab-item active" id="tab-editor" onclick="switchTab('editor')">📄 CHỈNH SỬA CODE</div>
  <div class="tab-item" id="tab-preview" onclick="switchTab('preview')">👁️ KẾT QUẢ</div>
</div>

<div class="main-content">
  <div id="pane-editor" class="window-pane active">
    <div class="editor-container">
      <div id="line-numbers" class="line-numbers"></div>
      <textarea id="code" spellcheck="false" oninput="handleInput()" onscroll="syncScroll()"><h1>Chào mừng bạn!</h1>
<p>Dùng nút Undo/Redo để quản lý lịch sử code.</p>
<script>
  console.log("Sẵn sàng!");
</script></textarea>
    </div>
  </div>
  <div id="pane-preview" class="window-pane">
    <iframe id="preview"></iframe>
  </div>
  <div id="error-log"></div>
</div>

<div class="popup" id="popup">
  <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
    <b id="popup-title" style="color:#007acc; font-size:12px;">TOOLS</b>
    <span onclick="closePopup()" style="color:red; cursor:pointer; font-weight:bold; padding: 2px 8px;">[ĐÓNG]</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const textarea = document.getElementById("code");
const lineNumbers = document.getElementById("line-numbers");
const errorLog = document.getElementById("error-log");
const preview = document.getElementById("preview");
const grid = document.getElementById("grid");
const popup = document.getElementById("popup");

// QUẢN LÝ LỊCH SỬ (UNDO/REDO)
let historyStack = [textarea.value];
let redoStack = [];

function saveToHistory() {
  const currentVal = textarea.value;
  if (currentVal !== historyStack[historyStack.length - 1]) {
    historyStack.push(currentVal);
    redoStack = []; // Khi có thay đổi mới, xóa redo stack
    if (historyStack.length > 50) historyStack.shift();
  }
}

function undo() {
  if (historyStack.length > 1) {
    const current = historyStack.pop();
    redoStack.push(current);
    textarea.value = historyStack[historyStack.length - 1];
    updateLineNumbers();
  }
}

function redo() {
  if (redoStack.length > 0) {
    const next = redoStack.pop();
    historyStack.push(next);
    textarea.value = next;
    updateLineNumbers();
  }
}

function handleInput() {
  saveToHistory();
  updateLineNumbers();
}

function syncScroll() { lineNumbers.scrollTop = textarea.scrollTop; }

function updateLineNumbers(errorLine = null) {
  const lines = textarea.value.split('\n').length;
  let lineStr = '';
  for (let i = 1; i <= lines; i++) {
    lineStr += `<div style="height:20px" class="${i === errorLine ? 'line-error' : ''}">${i}</div>`;
  }
  lineNumbers.innerHTML = lineStr;
  syncScroll();
}

function runCode() {
  const userCode = textarea.value;
  errorLog.style.display = "none";
  const blobContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:sans-serif;padding:15px;}</style><script>window.onerror=function(m,u,l,c){window.parent.postMessage({type:'error',msg:m,line:l,col:c},'*');return true;};<\/script></head><body>${userCode}</body></html>`;
  const blob = new Blob([blobContent], { type: 'text/html;charset=UTF-8' });
  preview.src = URL.createObjectURL(blob);
}

function switchTab(type) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + type).classList.add('active');
  document.querySelectorAll('.window-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + type).classList.add('active');
  if(type === 'preview') runCode();
}

const data = {
  quick: [
    {n:"Tab ⮕", a:()=>ins("  ")}, {n:"#", a:()=>ins("#")}, {n:".", a:()=>ins(".")},
    {n:"(", a:()=>ins("(")}, {n:")", a:()=>ins(")")}, {n:"&", a:()=>ins("&")},
    {n:"/* CSS */", a:()=>ins("/* */")}, {n:"// JS", a:()=>ins("// ")},
    {n:"/* JS-Khối */", a:()=>ins("/* */")}, {n:"_", a:()=>ins("_")},
    {n:"<", a:()=>ins("<")}, {n:">", a:()=>ins(">")}, {n:";", a:()=>ins(";")},
    {n:"' '", a:()=>ins("''")}, {n:'" "', a:()=>ins('""')}
  ],
  html: [
    {n:'id=""', a:()=>ins('id=""')}, {n:'class=""', a:()=>ins('class=""')},
    {n:'src=""', a:()=>ins('src=""')}, {n:'href=""', a:()=>ins('href=""')},
    {n:'style=""', a:()=>ins('style=""')}, {n:'type=""', a:()=>ins('type=""')},
    {n:'alt=""', a:()=>ins('alt=""')}, {n:"<div>", a:()=>wrap("<div>","</div>")},
    {n:"<span>", a:()=>wrap("<span>","</span>")}, {n:"<h1>", a:()=>wrap("<h1>","</h1>")},
    {n:"<p>", a:()=>wrap("<p>","</p>")}, {n:"<a>", a:()=>wrap("<a>","</a>")},
    {n:"<img>", a:()=>ins('<img src="" alt="">')},
    {n:"<script>", a:()=>wrap("<script>\n","\n<\/script>")},
    {n:"<style>", a:()=>wrap("<style>\n","\n</style>")}
  ],
  css: [
    {n:"f-size", a:()=>ins("font-size: 16px;")}, {n:"f-bold", a:()=>ins("font-weight: bold;")},
    {n:"color", a:()=>ins('color: #ffffff;')}, {n:"t-center", a:()=>ins("text-align: center;")},
    {n:"l-height", a:()=>ins("line-height: 1.5;")}, {n:"family", a:()=>ins("font-family: sans-serif;")},
    {n:"shadow", a:()=>ins("text-shadow: 2px 2px 4px rgba(0,0,0,0.5);")},
    {n:"flex", a:()=>ins("display: flex;")}, {n:"column", a:()=>ins("flex-direction: column;")},
    {n:"center", a:()=>ins("justify-content: center; align-items: center;")},
    {n:"grid", a:()=>ins("display: grid;")}, {n:"gap", a:()=>ins("gap: 10px;")},
    {n:"fixed", a:()=>ins("position: fixed; top: 0;")}, {n:"absolute", a:()=>ins("position: absolute;")},
    {n:"width", a:()=>ins("width: 100%;")}, {n:"height", a:()=>ins("height: 100vh;")},
    {n:"padding", a:()=>ins("padding: 10px;")}, {n:"margin", a:()=>ins("margin: 10px;")},
    {n:"border", a:()=>ins("border: 1px solid #444;")}, {n:"radius", a:()=>ins("border-radius: 8px;")},
    {n:"bg-color", a:()=>ins("background-color: #1e1e1e;")}, {n:"box-sizing", a:()=>ins("box-sizing: border-box;")}
  ],
  js: [
    {n:"log", a:()=>ins('console.log("");')}, {n:"alert", a:()=>ins('alert("");')},
    {n:"if else", a:()=>ins('if () {\n  \n} else {\n  \n}')},
    {n:"function", a:()=>ins('function name() {\n  \n}')},
    {n:"for", a:()=>ins('for (let i = 0; i < 10; i++) {\n  \n}')},
    {n:"getById", a:()=>ins('document.getElementById("");')},
    {n:"querySelector", a:()=>ins('document.querySelector("");')},
    {n:".focus()", a:()=>ins('.focus();')}, {n:".value", a:()=>ins('.value')},
    {n:".innerHTML", a:()=>ins('.innerHTML = "";')}, {n:".innerText", a:()=>ins('.innerText = "";')},
    {n:".style", a:()=>ins('.style.')},
    {n:"addEvent", a:()=>ins('.addEventListener("", () => {\n  \n});')}
  ]
};

function ins(val) {
  const s = textarea.selectionStart, e = textarea.selectionEnd;
  textarea.setRangeText(val, s, e, 'end');
  textarea.focus();
  saveToHistory();
  updateLineNumbers();
}

function wrap(open, close) {
  const s = textarea.selectionStart, e = textarea.selectionEnd;
  const sel = textarea.value.substring(s, e);
  textarea.setRangeText(open + sel + close, s, e, 'end');
  textarea.focus();
  saveToHistory();
  updateLineNumbers();
}

function openPopup(type) {
  popup.style.display = "block";
  document.getElementById("popup-title").innerText = type.toUpperCase();
  grid.innerHTML = '';
  data[type].forEach(item => {
    const btn = document.createElement('button');
    btn.innerText = item.n;
    btn.onclick = item.a;
    grid.appendChild(btn);
  });
}

function closePopup() { popup.style.display = "none"; }

window.addEventListener('message', (e) => {
  if (e.data.type === 'error') {
    errorLog.style.display = "block";
    errorLog.innerHTML = `⚠️ Lỗi: ${e.data.msg} (Dòng ${e.data.line})`;
    switchTab('editor');
    updateLineNumbers(e.data.line);
  }
});

function resetEditor() {
  if(confirm("Reset code?")) {
    textarea.value = "<h1>Chào mừng!</h1>";
    historyStack = [textarea.value];
    redoStack = [];
    updateLineNumbers();
  }
}

updateLineNumbers();
</script>
</body>
</html>
