<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini E</title>
<style>
  * { box-sizing: border-box; }
  
  /* Khóa cứng màn hình, không cho body cuộn */
  body { 
    margin: 0; 
    font-family: sans-serif; 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    background: #1a1a1a; 
    color: white; 
    overflow: hidden; 
  }
  
  /* THANH CÔNG CỤ */
  .topbar { 
    display: flex; 
    gap: 6px; 
    padding: 10px; 
    background: #111; 
    border-bottom: 1px solid #333; 
    overflow-x: auto; 
    align-items: center; 
    height: 60px; 
    flex-shrink: 0; 
    z-index: 10;
  }
  .topbar button { padding: 8px 12px; border: none; border-radius: 6px; background: #333; color: white; cursor: pointer; font-size: 11px; white-space: nowrap; }
  .btn-reload { background: #ce9178 !important; color: #000 !important; font-weight: bold; }
  .btn-history { background: #444 !important; color: #fff !important; }
  .btn-run { background: #28a745 !important; margin-left: auto; font-weight: bold; padding: 8px 20px !important; }

  /* HỆ THỐNG TAB */
  .tab-bar { 
    display: flex; 
    background: #252526; 
    padding-left: 10px; 
    gap: 2px; 
    border-bottom: 1px solid #333; 
    user-select: none; 
    height: 40px; 
    flex-shrink: 0; 
  }
  .tab-item { padding: 8px 20px; cursor: pointer; background: #2d2d2d; color: #969696; font-size: 12px; font-weight: 500; border-radius: 5px 5px 0 0; margin-top: 5px; display: flex; align-items: center; gap: 8px; }
  .tab-item.active { background: #1e1e1e; color: #ffffff; border-bottom: 2px solid #007acc; }

  /* NỘI DUNG CHÍNH */
  .main-content { 
    flex: 1; 
    position: relative; 
    display: flex; 
    flex-direction: column; 
    min-height: 0; 
  }

  .window-pane { 
    display: none; 
    height: 100%; 
    width: 100%; 
    flex-direction: column; 
    min-height: 0; 
  }
  .window-pane.active { display: flex; }

  /* EDITOR */
  .editor-container { 
    display: flex; 
    flex: 1; 
    background: #1e1e1e; 
    overflow: hidden; 
    position: relative; 
    min-height: 0;
  }
  .line-numbers { width: 40px; padding: 15px 0; text-align: center; background: #252526; color: #858585; font-family: monospace; font-size: 14px; line-height: 20px; user-select: none; overflow: hidden; }
  
  textarea { 
    flex: 1; 
    background: transparent; 
    color: #9cdcfe; 
    padding: 15px; 
    font-family: 'Consolas', monospace; 
    font-size: 14px; 
    line-height: 20px; 
    border: none; 
    outline: none; 
    resize: none; 
    white-space: pre; 
    overflow: auto; 
  }

  /* PREVIEW - ĐÃ CHỈNH SỬA ĐỂ HỖ TRỢ CUỘN */
  #pane-preview { 
    flex: 1; 
    padding: 10px; 
    background: #1a1a1a; 
    min-height: 0;
    overflow: hidden;
  }
  
  iframe { 
    width: 100%; 
    height: 100%; 
    border: none; 
    background: white; 
    border-radius: 4px; 
    box-shadow: 0 5px 20px rgba(0,0,0,0.5); 
    display: block;
    overflow: auto; /* Cho phép cuộn */
  }

  #error-log { display: none; background: #4a1515; color: #ff9999; padding: 10px; font-family: monospace; font-size: 12px; flex-shrink: 0; }

  /* POPUP TOOLS */
  .popup {
    display: none; position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); 
    width: 95%; background: #252526; border: 2px solid #0078d4; padding: 5px; 
    z-index: 9999; border-radius: 8px; box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
  }
  .grid { 
    display: flex; 
    flex-flow: column wrap; 
    height: 70px; 
    gap: 8px; 
    margin-top: 5px; 
    overflow-x: auto; 
    overflow-y: hidden; 
    padding: 5px; 
    align-content: flex-start;
  }

  .grid button {
    flex: 0 0 auto;
    width: max-content;
    padding: 4px 12px;
    height: calc(50% - 5px);
    white-space: nowrap;
    border: 1px solid #444;
    border-radius: 4px;
    background: #333;
    color: #ddd;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-history" onclick="document.getElementById('file-input').click()">📂 Mở File</button>
  <input type="file" id="file-input" style="display:none" accept=".html,.txt,.css,.js" onchange="loadFile(this)">
  <button class="btn-reload" onclick="resetEditor()">🔄 Reset</button>
  <button class="btn-history" onclick="undo()">↩ Undo</button>
  <button class="btn-history" onclick="redo()">↪ Redo</button>
  <button onclick="openPopup('quick')">⌨️ Phím nhanh</button>
  <button onclick="openPopup('html')">HTML</button>
  <button onclick="openPopup('css')">CSS</button>
  <button onclick="openPopup('js')">JS</button>
  <button class="btn-run" style="background: #007acc !important;" onclick="saveCurrentFile()">💾 LƯU FILE</button>
  <button class="btn-run" onclick="runCode()">CHẠY ▶</button>
</div>

<div class="tab-bar" id="tab-container">
  <div class="tab-item active" id="tab-editor" onclick="switchTab('editor')">📄 CHỈNH SỬA CODE</div>
  <div class="tab-item" id="tab-preview" onclick="switchTab('preview')">👁️ KẾT QUẢ</div>
</div>

<div class="main-content">
  <div id="pane-editor" class="window-pane active">
    <div class="editor-container">
      <div id="line-numbers" class="line-numbers"></div>
      <textarea id="code" spellcheck="false" oninput="handleInput()" onscroll="syncScroll()"></textarea>
    </div>
  </div>
  <div id="pane-preview" class="window-pane">
    <iframe id="preview"></iframe>
  </div>
  <div id="error-log"></div>
</div>

<div class="popup" id="popup">
  <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
    <b id="popup-title" style="color:#007acc; font-size:12px;">TOOLS</b>
    <span onclick="closePopup()" style="color:red; cursor:pointer; font-weight:bold; padding: 2px 8px;">[ĐÓNG]</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const textarea = document.getElementById("code");
const lineNumbers = document.getElementById("line-numbers");
const errorLog = document.getElementById("error-log");
const preview = document.getElementById("preview");
const grid = document.getElementById("grid");
const popup = document.getElementById("popup");

// Dữ liệu ban đầu
let historyStack = ["<h1>Chào mừng!</h1>"];
let redoStack = [];
textarea.value = historyStack[0];

// CẬP NHẬT HÀM CHẠY CODE ĐỂ HỖ TRỢ CUỘN TRONG IFRAME
function runCode() {
  const userCode = textarea.value;
  errorLog.style.display = "none";
  
  const blobContent = `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <style>
        /* Cấu hình để nội dung bên trong iframe tự cuộn */
        html, body { 
          margin: 0; 
          padding: 0; 
          min-height: 100%; 
          background: white; 
          color: black;
          font-family: sans-serif;
          overflow-x: hidden;
          overflow-y: auto;
        }
        #app-wrapper { padding: 15px; box-sizing: border-box; }
      </style>
      <script>
        window.onerror=function(m,u,l,c){
          window.parent.postMessage({type:'error',msg:m,line:l,col:c},'*');
          return true;
        };
      <\/script>
    </head>
    <body><div id="app-wrapper">${userCode}</div></body>
    </html>`;

  const blob = new Blob([blobContent], { type: 'text/html;charset=UTF-8' });
  if (preview.src) URL.revokeObjectURL(preview.src);
  preview.src = URL.createObjectURL(blob);
}

// Chuyển Tab
function switchTab(type) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + type).classList.add('active');
  document.querySelectorAll('.window-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + type).classList.add('active');
  if(type === 'preview') runCode();
}

// Xử lý Editor
function handleInput() { 
  const val = textarea.value;
  if (val !== historyStack[historyStack.length - 1]) {
    historyStack.push(val);
    if (historyStack.length > 50) historyStack.shift();
    redoStack = [];
  }
  updateLineNumbers(); 
}

function updateLineNumbers(errorLine = null) {
  const lines = textarea.value.split('\n').length;
  let lineStr = '';
  for (let i = 1; i <= lines; i++) {
    lineStr += `<div style="height:20px" class="${i === errorLine ? 'line-error' : ''}">${i}</div>`;
  }
  lineNumbers.innerHTML = lineStr;
  syncScroll();
}

function syncScroll() { lineNumbers.scrollTop = textarea.scrollTop; }

function undo() {
  if (historyStack.length > 1) {
    redoStack.push(historyStack.pop());
    textarea.value = historyStack[historyStack.length - 1];
    updateLineNumbers();
  }
}

function redo() {
  if (redoStack.length > 0) {
    const next = redoStack.pop();
    historyStack.push(next);
    textarea.value = next;
    updateLineNumbers();
  }
}

// Công cụ phím tắt
const data = {
  quick: [{n:"Tab ⮕", a:()=>ins("  ")}, {n:"#", a:()=>ins("#")}, {n:".", a:()=>ins(".")}, {n:"(", a:()=>ins("(")}, {n:")", a:()=>ins(")")}, {n:"&", a:()=>ins("&")}, {n:"/* CSS */", a:()=>ins("/* */")}, {n:"// JS", a:()=>ins("// ")}, {n:"<", a:()=>ins("<")}, {n:">", a:()=>ins(">")}, {n:";", a:()=>ins(";")}, {n:"' '", a:()=>ins("''")}, {n:'" "', a:()=>ins('""')}],
  html: [
    {n:'id=""', a:()=>ins('id=""')}, {n:'class=""', a:()=>ins('class=""')}, {n:'src=""', a:()=>ins('src=""')}, {n:'href=""', a:()=>ins('href=""')}, 
    {n:"<div>", a:()=>ins("<div></div>")}, {n:"<span>", a:()=>ins("<span></span>")}, {n:"<h1>", a:()=>ins("<h1></h1>")}, {n:"<p>", a:()=>ins("<p></p>")}, 
    {n:"<a>", a:()=>ins("<a></a>")}, {n:"<img>", a:()=>ins('<img src="" alt="">')}, {n:"<script>", a:()=>ins("<script>\n\n<\/script>")}, {n:"<style>", a:()=>ins("<style>\n\n</style>")}
  ],
  css: [{n:"f-size", a:()=>ins("font-size: 16px;")}, {n:"color", a:()=>ins('color: #ffffff;')}, {n:"flex", a:()=>ins("display: flex;")}, {n:"padding", a:()=>ins("padding: 10px;")}, {n:"border", a:()=>ins("border: 1px solid #444;")}],
  js: [{n:"log", a:()=>ins('console.log("");')}, {n:"alert", a:()=>ins('alert("");')}, {n:"getById", a:()=>ins('document.getElementById("");')}]
};

function ins(val) {
  const s = textarea.selectionStart, e = textarea.selectionEnd;
  textarea.setRangeText(val, s, e, 'end');
  let newPos = s + val.length;
  if (val.includes('></')) newPos = s + val.indexOf('>') + 1;
  else if (val.endsWith('""') || val.endsWith('()') || val.endsWith('{}')) newPos = s + val.length - 1;
  else if (val.endsWith('=""')) newPos = s + val.length - 1;
  setTimeout(() => { textarea.focus(); textarea.setSelectionRange(newPos, newPos); }, 10);
  handleInput();
}

function openPopup(type) {
  popup.style.display = "block";
  document.getElementById("popup-title").innerText = type.toUpperCase();
  grid.innerHTML = '';
  data[type].forEach(item => {
    const btn = document.createElement('button');
    btn.innerText = item.n;
    btn.onclick = item.a;
    grid.appendChild(btn);
  });
}

function closePopup() { popup.style.display = "none"; }

// File System
function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    textarea.value = e.target.result;
    handleInput();
    alert("Đã tải: " + file.name);
  };
  reader.readAsText(file);
}

function saveCurrentFile() {
  const blob = new Blob([textarea.value], { type: "text/plain" });
  const a = document.createElement("a");
  a.download = "index.html";
  a.href = URL.createObjectURL(blob);
  a.click();
}

function resetEditor() { if(confirm("Reset code?")) { textarea.value = "<h1>Chào mừng!</h1>"; handleInput(); } }

window.addEventListener('message', (e) => {
  if (e.data.type === 'error') {
    errorLog.style.display = "block";
    errorLog.innerHTML = `⚠️ Lỗi: ${e.data.msg} (Dòng ${e.data.line})`;
    updateLineNumbers(e.data.line);
  }
});

updateLineNumbers();
</script>
</body>
</html>
